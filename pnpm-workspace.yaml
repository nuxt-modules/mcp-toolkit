packages:
  - apps/*
  - packages/*

shamefullyHoist: true
strictPeerDependencies: false

allowBuilds:
  '@parcel/watcher': false
  esbuild: false
  unrs-resolver: false
  vue-demi: false
  cbor-extract: false
  core-js-pure: false
  better-sqlite3: true
  isolated-vm: true
  sharp: true

overrides:
  '@nuxtjs/mcp-toolkit': workspace:*

minimumReleaseAge: 2880

minimumReleaseAgeExclude:
  # Nuxt
  - '@nuxt/*'
  - '@nuxtjs/*'
  - 'nuxt'
  - 'nuxt-*'
  # Vercel
  - '@vercel/*'
  - '@ai-sdk/*'
  - 'ai'
  - shaders@2.5.128
